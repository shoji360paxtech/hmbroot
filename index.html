<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0">
    </head>
    <body style="width: 100;height: 100%;">
        <script>
            window.onload=function(){
                document.getElementById('submit').click()
            }
        </script>
        <style>
            html,body { margin:0; width:100%; height:100%; overflow:hidden; }
            #iframe-wrapper {
              position:absolute; top:0px; left:0px; bottom:0px; width:100%;
            }
            #ifrm { width:100%; height:100%; position:absolute; top:0px; bottom:0px; }
          </style>
          <div id="iframe-wrapper">
            <iframe id="ifrm" name="ifrm" src="about:blank"></iframe>
          </div>

        <form style="display: none;" method="POST"  target="ifrm" action='##URL##' method='post' style="display:none" >
            <input type='text' value='<?=usr?>' name='usr'>
            <input type='text' value='<?=brand?>' name='brand'>
            <input type='text' value='<?=emailid?>' name=emailid>
            <input type='text' value='<?=hash?>' name='hash'>
            <input type='text' value='<?=pl?>' name='pl'>
            <input type='text' value='<?=newpl?>' name='newpl'>
            <input type='text' value='<?=action?>' name='action'>
            <input type="submit" id="submit" value='submit'>
          </form>
    </body>
</html>

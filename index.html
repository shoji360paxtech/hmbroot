.square_btn {
  display: block;
  position: relative;
  width: 30px;
  height: 30px;
  border: 2px solid #333;  
  background: #fff;  
}

.square_btn::before, .square_btn::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 3px;  
  height: 27px;  
  background: #333;  
}

.square_btn::before {
  transform: translate(-50%,-50%) rotate(45deg);
}

.square_btn::after {
  transform: translate(-50%,-50%) rotate(-45deg);
}
